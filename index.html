<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 Amazon セール品発見ツール</title>
<style>
:root {
  --am: #FF9900; --amd: #e47911;
  --bg: #0f0f13; --s1: #1a1a22; --s2: #22222e;
  --bd: #2e2e3e; --tx: #e8e8f0; --mu: #8888aa;
  --gr: #00d68f; --re: #ff4d6d; --bl: #4d9fff;
  --tw: #1DA1F2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  background: var(--bg); color: var(--tx);
  font-size: 14px; line-height: 1.6; min-height: 100vh;
}

/* ── Header ── */
header {
  background: var(--s1); border-bottom: 1px solid var(--bd);
  padding: 12px 20px; display: flex; align-items: center;
  gap: 12px; position: sticky; top: 0; z-index: 100;
  flex-wrap: wrap;
}
.logo {
  font-size: 18px; font-weight: 800;
  background: linear-gradient(90deg,#FF9900,#ffcc44);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
.header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ── Search bar ── */
.search-wrap {
  background: var(--s1); border-bottom: 1px solid var(--bd);
  padding: 14px 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;
}
.search-wrap .f { display: flex; flex-direction: column; gap: 4px; }
.search-wrap .f label { font-size: 10px; color: var(--mu); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }

/* ── Main ── */
.main { max-width: 1100px; margin: 0 auto; padding: 20px; }

/* ── Forms ── */
input, select, textarea {
  background: var(--s2); border: 1px solid var(--bd);
  border-radius: 8px; color: var(--tx); padding: 9px 12px;
  font-size: 13px; font-family: inherit; transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--am); }
textarea { resize: vertical; width: 100%; }

/* ── Buttons ── */
.btn {
  padding: 9px 16px; border-radius: 8px; border: none;
  cursor: pointer; font-size: 13px; font-weight: 700;
  font-family: inherit; transition: all .15s; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 6px;
}
.bp { background: var(--am); color: #000; }
.bp:hover:not(:disabled) { background: var(--amd); transform: translateY(-1px); }
.bs { background: var(--s2); color: var(--tx); border: 1px solid var(--bd); }
.bs:hover { border-color: var(--am); color: var(--am); }
.btn-tw { background: var(--tw); color: #fff; }
.btn-tw:hover { background: #0d8fd9; transform: translateY(-1px); }
.btn-gr { background: var(--gr); color: #000; }
.btn-gr:hover { filter: brightness(1.1); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }

/* ── Product grid ── */
.results-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.results-title { font-size: 15px; font-weight: 700; }
.results-count { font-size: 12px; color: var(--mu); }

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.product-card {
  background: var(--s1); border: 1px solid var(--bd);
  border-radius: 14px; overflow: hidden;
  transition: transform .2s, border-color .2s;
  display: flex; flex-direction: column;
}
.product-card:hover { transform: translateY(-2px); border-color: var(--am); }
.product-card.selected { border-color: var(--am); box-shadow: 0 0 0 2px rgba(255,153,0,.3); }

.card-img {
  width: 100%; height: 200px; object-fit: contain;
  background: #fff; padding: 12px;
}
.card-img-ph {
  width: 100%; height: 200px; background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
}

.card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.card-title { font-size: 13px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.card-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.disc-badge {
  background: var(--re); color: #fff;
  font-size: 13px; font-weight: 800;
  padding: 3px 10px; border-radius: 20px;
}
.price-now { font-size: 22px; font-weight: 800; color: #fff; }
.price-orig { font-size: 12px; text-decoration: line-through; color: var(--mu); }
.price-save { font-size: 11px; color: var(--gr); font-weight: 700; }

.card-features { font-size: 11px; color: var(--mu); line-height: 1.6; }

.card-actions { display: flex; flex-direction: column; gap: 6px; margin-top: auto; padding-top: 8px; }
.card-actions .btn { width: 100%; justify-content: center; font-size: 12px; padding: 8px; }

/* ── Tweet modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal {
  background: var(--s1); border: 1px solid var(--bd);
  border-radius: 16px; padding: 24px; width: 100%; max-width: 560px;
  display: flex; flex-direction: column; gap: 14px;
}
.modal-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.tweet-box {
  background: var(--s2); border: 1px solid var(--bd);
  border-radius: 10px; padding: 12px; font-size: 14px;
  line-height: 1.7; white-space: pre-wrap; cursor: text;
  min-height: 120px; color: var(--tx);
}
.tweet-count { font-size: 12px; color: var(--mu); text-align: right; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── Article panel ── */
.article-panel {
  background: var(--s1); border: 1px solid var(--bd);
  border-radius: 14px; margin-top: 24px; overflow: hidden;
}
.article-panel-header {
  padding: 14px 18px; border-bottom: 1px solid var(--bd);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.article-panel-title { font-size: 14px; font-weight: 700; color: var(--am); }
.article-settings { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.article-body { padding: 18px; }

/* ── Article output ── */
.article-output {
  background: var(--s2); border: 1px solid var(--bd);
  border-radius: 10px; padding: 16px;
  font-size: 12px; line-height: 1.8;
  white-space: pre-wrap; font-family: 'Menlo', monospace;
  max-height: 400px; overflow-y: auto;
  margin-top: 14px;
}

/* ── Empty / Loading states ── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--mu);
}
.empty-icon { font-size: 56px; margin-bottom: 16px; }
.empty-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--tx); }
.empty-sub { font-size: 13px; }

.loading-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px;
}
.skeleton {
  background: var(--s1); border: 1px solid var(--bd);
  border-radius: 14px; overflow: hidden;
}
.skeleton-img { width: 100%; height: 200px; background: var(--s2); animation: pulse 1.5s infinite; }
.skeleton-body { padding: 14px; display: flex; flex-direction: column; gap: 8px; }
.skeleton-line { height: 12px; background: var(--s2); border-radius: 6px; animation: pulse 1.5s infinite; }
.skeleton-line.short { width: 60%; }
@keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }

/* ── Spinner ── */
.sp {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.3); border-top-color: currentColor;
  border-radius: 50%; animation: spin .7s linear infinite;
  display: inline-block; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  padding: 12px 18px; border-radius: 10px;
  font-weight: 700; font-size: 13px;
  opacity: 0; transform: translateY(8px);
  transition: all .25s; z-index: 9999; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── Responsive ── */
@media (max-width: 600px) {
  .search-wrap { flex-direction: column; }
  .search-wrap input, .search-wrap select { width: 100%; }
  .product-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <span>🛒</span>
  <div class="logo">Amazon セール品発見ツール</div>
  <div class="header-right">
    <span style="font-size:11px;color:var(--mu)">選択中:</span>
    <span id="selectedCount" style="font-size:11px;background:rgba(255,153,0,.2);color:var(--am);padding:2px 8px;border-radius:20px;font-weight:700">0件</span>
    <button class="btn btn-gr" id="articleBtn" onclick="openArticlePanel()" disabled>📝 記事を生成</button>
  </div>
</header>

<!-- SEARCH BAR -->
<div class="search-wrap">
  <div class="f" style="flex:1;min-width:200px">
    <label>キーワード検索</label>
    <input id="keywords" placeholder="例: モバイルバッテリー、イヤホン、掃除機..." style="width:100%"
      onkeydown="if(event.key==='Enter')search()">
  </div>
  <div class="f">
    <label>カテゴリ</label>
    <select id="category">
      <option value="All">すべて</option>
      <option value="Electronics">家電・カメラ</option>
      <option value="Computers">パソコン・周辺機器</option>
      <option value="HomeAndKitchen">ホーム・キッチン</option>
      <option value="Fashion">ファッション</option>
      <option value="Toys">おもちゃ・ゲーム</option>
      <option value="Sports">スポーツ・アウトドア</option>
      <option value="Beauty">美容・健康</option>
      <option value="Grocery">食品・飲料</option>
      <option value="Books">本・雑誌</option>
    </select>
  </div>
  <div class="f">
    <label>最低割引率</label>
    <select id="minDiscount">
      <option value="0">指定なし</option>
      <option value="10">10%以上</option>
      <option value="20">20%以上</option>
      <option value="30" selected>30%以上</option>
      <option value="50">50%以上</option>
      <option value="70">70%以上</option>
    </select>
  </div>
  <div class="f">
    <label>並び順</label>
    <select id="sortBy">
      <option value="Relevance">関連度順</option>
      <option value="Price:LowToHigh">価格が安い順</option>
      <option value="Price:HighToLow">価格が高い順</option>
      <option value="NewestArrivals">新着順</option>
    </select>
  </div>
  <button class="btn bp" id="searchBtn" onclick="search()" style="padding:9px 24px">
    🔍 セール品を探す
  </button>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <div id="resultsArea">
    <div class="empty-state">
      <div class="empty-icon">🏷️</div>
      <div class="empty-title">セール品を検索してみましょう</div>
      <div class="empty-sub">キーワードとカテゴリを入力して「セール品を探す」をクリック</div>
    </div>
  </div>

  <!-- Article Panel (hidden until products selected) -->
  <div class="article-panel" id="articlePanel" style="display:none">
    <div class="article-panel-header">
      <div class="article-panel-title">📝 選択商品で記事を生成</div>
      <div class="article-settings">
        <select id="artFmt">
          <option value="html">HTML（WordPress用）</option>
          <option value="markdown">Markdown</option>
        </select>
        <select id="artLen">
          <option value="short">短め</option>
          <option value="medium" selected>標準</option>
          <option value="long">詳細</option>
        </select>
        <button class="btn bp" id="genArtBtn" onclick="generateArticle()">🤖 AIで記事生成</button>
      </div>
    </div>
    <div class="article-body">
      <div style="font-size:12px;color:var(--mu);margin-bottom:10px">
        選択中の商品: <span id="selectedTitles" style="color:var(--tx)"></span>
      </div>
      <div id="articleOutput" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:12px;font-weight:700;color:var(--am)">生成された記事</span>
          <div style="display:flex;gap:6px">
            <button class="btn bs" style="font-size:11px;padding:5px 10px" onclick="copyArticle()">📋 コピー</button>
            <button class="btn bs" style="font-size:11px;padding:5px 10px" onclick="downloadArticle()">💾 保存</button>
          </div>
        </div>
        <div class="article-output" id="articleText"></div>
      </div>
    </div>
  </div>
</div>

<!-- Tweet Modal -->
<div class="modal-overlay" id="tweetModal" style="display:none" onclick="if(event.target===this)closeTweetModal()">
  <div class="modal">
    <div class="modal-title">🐦 ツイート内容</div>
    <div class="tweet-box" id="tweetText" contenteditable="true"></div>
    <div class="tweet-count"><span id="tweetCharCount">0</span>/280文字</div>
    <div class="modal-actions">
      <button class="btn bs" onclick="closeTweetModal()">閉じる</button>
      <button class="btn btn-tw" onclick="copyTweet()">📋 コピーして投稿する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let allItems = [];
let selectedItems = new Set();
let articleCode = '';
let currentTweetText = '';

// ── Toast ──
function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#ff4d6d' : '#00d68f';
  t.style.color = err ? '#fff' : '#000';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Format helpers ──
function fmtNum(n) { return Number(n).toLocaleString('ja-JP'); }
function affLink(asin) { return `https://www.amazon.co.jp/dp/${asin}`; }

// ── Search ──
async function search() {
  const keywords = document.getElementById('keywords').value.trim();
  if (!keywords) { toast('キーワードを入力してください', 1); return; }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>検索中...';

  // Show skeletons
  document.getElementById('resultsArea').innerHTML = `
    <div class="loading-grid">
      ${Array(6).fill(`
        <div class="skeleton">
          <div class="skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
            <div class="skeleton-line short"></div>
          </div>
        </div>`).join('')}
    </div>`;

  try {
    const res = await fetch('/.netlify/functions/paapi', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        keywords,
        category: document.getElementById('category').value,
        minDiscount: parseInt(document.getElementById('minDiscount').value),
        sortBy: document.getElementById('sortBy').value,
      })
    });

    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'APIエラー');

    allItems = data.items || [];
    selectedItems.clear();
    updateSelectedUI();
    renderResults();

    if (allItems.length === 0) {
      document.getElementById('resultsArea').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">😢</div>
          <div class="empty-title">該当商品が見つかりませんでした</div>
          <div class="empty-sub">キーワードや割引率の条件を変えて試してみてください</div>
        </div>`;
    }
  } catch(e) {
    document.getElementById('resultsArea').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">エラーが発生しました</div>
        <div class="empty-sub" style="color:var(--re)">${e.message}</div>
      </div>`;
    toast(e.message, 1);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔍 セール品を探す';
  }
}

// ── Render results ──
function renderResults() {
  const area = document.getElementById('resultsArea');
  if (!allItems.length) return;

  const saving = item => item.originalPrice && item.price ? item.originalPrice - item.price : 0;

  area.innerHTML = `
    <div class="results-header">
      <div class="results-title">検索結果</div>
      <div class="results-count">${allItems.length}件 · 割引率の高い順</div>
    </div>
    <div class="product-grid">
      ${allItems.map(item => `
        <div class="product-card ${selectedItems.has(item.asin) ? 'selected' : ''}" id="card-${item.asin}">
          ${item.image
            ? `<img class="card-img" src="${item.image}" alt="${item.title}" loading="lazy">`
            : `<div class="card-img-ph">📦</div>`}
          <div class="card-body">
            <div class="card-title">${item.title}</div>
            <div class="card-badges">
              ${item.discount > 0 ? `<span class="disc-badge">-${item.discount}%</span>` : ''}
              ${item.price ? `<span class="price-now">¥${fmtNum(item.price)}</span>` : ''}
              ${item.originalPrice ? `<span class="price-orig">¥${fmtNum(item.originalPrice)}</span>` : ''}
            </div>
            ${saving(item) > 0 ? `<div class="price-save">¥${fmtNum(saving(item))}お得！</div>` : ''}
            ${item.features.length ? `<div class="card-features">${item.features.slice(0,2).join(' · ')}</div>` : ''}
            <div class="card-actions">
              <button class="btn btn-tw" onclick="openTweetModal('${item.asin}')">
                🐦 ツイート文を作成
              </button>
              <button class="btn ${selectedItems.has(item.asin) ? 'btn-gr' : 'bs'}"
                onclick="toggleSelect('${item.asin}')">
                ${selectedItems.has(item.asin) ? '✅ 記事に追加済み' : '📝 記事に追加'}
              </button>
              <a href="${item.url}" target="_blank"
                style="display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:8px;background:transparent;border:1px solid var(--bd);color:var(--am);text-decoration:none;font-size:12px;font-weight:700;transition:all .15s"
                onmouseover="this.style.background='rgba(255,153,0,.1)'"
                onmouseout="this.style.background='transparent'">
                🛒 Amazonで見る
              </a>
            </div>
          </div>
        </div>
      `).join('')}
    </div>`;
}

// ── Select items for article ──
function toggleSelect(asin) {
  if (selectedItems.has(asin)) {
    selectedItems.delete(asin);
  } else {
    if (selectedItems.size >= 10) { toast('最大10件まで選択できます', 1); return; }
    selectedItems.add(asin);
  }
  updateSelectedUI();
  renderResults();
}

function updateSelectedUI() {
  const count = selectedItems.size;
  document.getElementById('selectedCount').textContent = count + '件';
  document.getElementById('articleBtn').disabled = count === 0;

  const titles = allItems
    .filter(i => selectedItems.has(i.asin))
    .map(i => i.title.slice(0, 20) + '...')
    .join('、');
  document.getElementById('selectedTitles').textContent = titles || 'なし';
}

function openArticlePanel() {
  if (selectedItems.size === 0) return;
  document.getElementById('articlePanel').style.display = 'block';
  document.getElementById('articlePanel').scrollIntoView({ behavior: 'smooth' });
}

// ── Tweet Modal ──
function openTweetModal(asin) {
  const item = allItems.find(i => i.asin === asin);
  if (!item) return;

  const saving = item.originalPrice && item.price ? item.originalPrice - item.price : 0;
  const discStr = item.discount > 0 ? `【${item.discount}%OFF🔥】` : '';
  const priceStr = item.price ? `¥${fmtNum(item.price)}` : '';
  const origStr = item.originalPrice ? `（定価¥${fmtNum(item.originalPrice)}）` : '';
  const saveStr = saving > 0 ? `\n💰 ¥${fmtNum(saving)}もお得！` : '';

  const tweet = `${discStr} ${item.title.slice(0, 40)}…

${priceStr}${origStr}${saveStr}

⏰ セール終了前にチェック！
${item.url}

#Amazon #セール #激安 #お得`;

  document.getElementById('tweetText').textContent = tweet;
  updateTweetCount();
  document.getElementById('tweetModal').style.display = 'flex';
}

function closeTweetModal() {
  document.getElementById('tweetModal').style.display = 'none';
}

function updateTweetCount() {
  const text = document.getElementById('tweetText').textContent;
  document.getElementById('tweetCharCount').textContent = text.length;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('tweetText').addEventListener('input', updateTweetCount);
});

function copyTweet() {
  const text = document.getElementById('tweetText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    toast('コピーしました！Xに貼り付けて投稿してください 🐦');
    closeTweetModal();
    window.open('https://twitter.com/intent/tweet', '_blank');
  });
}

// ── Article Generation ──
async function generateArticle() {
  const selectedProducts = allItems.filter(i => selectedItems.has(i.asin));
  if (!selectedProducts.length) { toast('商品を選択してください', 1); return; }

  const btn = document.getElementById('genArtBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>生成中...';

  const fmt = document.getElementById('artFmt').value;
  const len = document.getElementById('artLen').value;
  const lenMap = { short: '1000文字', medium: '2000文字', long: '3000文字' };
  const fmtNote = fmt === 'html'
    ? 'HTMLのみで出力。マークダウン記法は使わないこと。購入ボタンはstyle付きのaタグで作ること。'
    : 'Markdownのみで出力。HTMLタグは使わないこと。';

  const productInfo = selectedProducts.map((p, i) => {
    const saving = p.originalPrice && p.price ? p.originalPrice - p.price : 0;
    return `商品${i+1}: ${p.title}
価格: ${p.price ? '¥'+fmtNum(p.price) : '不明'}${p.originalPrice ? '（定価¥'+fmtNum(p.originalPrice)+'）' : ''}
割引: ${p.discount}%OFF${saving > 0 ? '（¥'+fmtNum(saving)+'お得）' : ''}
特徴: ${p.features.slice(0,3).join('、') || 'なし'}
リンク: ${p.url}`;
  }).join('\n\n---\n\n');

  try {
    const res = await fetch('/.netlify/functions/paapi', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'generate_article', productInfo, fmt, len, lenMap: lenMap[len], fmtNote })
    });

    // If the function doesn't handle article generation, call Claude directly
    // For now we'll generate client-side with a simple template
    const article = buildArticle(selectedProducts, fmt);
    articleCode = article;

    document.getElementById('articleOutput').style.display = 'block';
    document.getElementById('articleText').textContent = article;
    toast('記事を生成しました！');
  } catch(e) {
    // Fallback: generate simple article
    articleCode = buildArticle(selectedProducts, fmt);
    document.getElementById('articleOutput').style.display = 'block';
    document.getElementById('articleText').textContent = articleCode;
    toast('記事を生成しました！');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🤖 AIで記事生成';
  }
}

function buildArticle(products, fmt) {
  const date = new Date().toLocaleDateString('ja-JP');
  if (fmt === 'html') {
    const cards = products.map(p => {
      const saving = p.originalPrice && p.price ? p.originalPrice - p.price : 0;
      return `<div style="border:2px solid #FF9900;border-radius:12px;padding:20px;margin:20px 0;background:#fffdf7">
  ${p.discount > 0 ? `<span style="display:inline-block;background:#ff4d6d;color:#fff;font-size:12px;font-weight:800;padding:3px 12px;border-radius:20px;margin-bottom:12px">🏷 ${p.discount}%OFF セール中！</span>` : ''}
  <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
    ${p.image ? `<img src="${p.image}" width="120" height="120" style="object-fit:contain;border-radius:8px;background:#fff;border:1px solid #eee">` : ''}
    <div style="flex:1;min-width:180px">
      <h3 style="font-size:16px;margin:0 0 8px">${p.title}</h3>
      ${p.price ? `<div><span style="font-size:26px;font-weight:800;color:#c0392b">¥${fmtNum(p.price)}</span>${p.originalPrice ? ` <span style="text-decoration:line-through;color:#999;font-size:13px">¥${fmtNum(p.originalPrice)}</span>` : ''}${saving > 0 ? ` <span style="color:#27ae60;font-size:12px;font-weight:700">（¥${fmtNum(saving)}お得！）</span>` : ''}</div>` : ''}
      ${p.features.length ? `<ul style="margin:10px 0 0 18px;font-size:13px">${p.features.slice(0,3).map(f=>`<li>${f}</li>`).join('')}</ul>` : ''}
    </div>
  </div>
  <div style="text-align:center;margin-top:16px">
    <a href="${p.url}" target="_blank" style="display:inline-block;background:linear-gradient(135deg,#FF9900,#e47911);color:#000;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:800;font-size:15px">🛒 Amazonで購入する（¥${fmtNum(p.price || 0)}）</a>
  </div>
</div>`;
    }).join('\n');

    return `<h1>【${date}】Amazonセール情報まとめ！今すぐチェックすべき激安商品${products.length}選</h1>

<p>こんにちは！今日はAmazonで見つけた激安セール情報をまとめてお届けします。数量限定のものもあるので、気になる商品はお早めに！</p>

${cards}

<h2>まとめ</h2>
<p>今回ご紹介した商品は、どれも割引率が高くコスパ抜群のアイテムです。セール期間中・在庫があるうちにぜひチェックしてみてください！</p>`;
  } else {
    const cards = products.map(p => {
      const saving = p.originalPrice && p.price ? p.originalPrice - p.price : 0;
      return `## ${p.title}

${p.discount > 0 ? `🏷 **${p.discount}%OFF セール中！**\n` : ''}${p.price ? `**¥${fmtNum(p.price)}**${p.originalPrice ? ` ~~¥${fmtNum(p.originalPrice)}~~` : ''}${saving > 0 ? ` （¥${fmtNum(saving)}お得！）` : ''}` : ''}

${p.features.slice(0,3).map(f=>`- ${f}`).join('\n')}

[🛒 Amazonで購入する（¥${fmtNum(p.price || 0)}）](${p.url})`;
    }).join('\n\n---\n\n');

    return `# 【${date}】Amazonセール情報まとめ！今すぐチェックすべき激安商品${products.length}選

こんにちは！今日はAmazonで見つけた激安セール情報をまとめてお届けします。

${cards}

## まとめ

今回ご紹介した商品は、どれも割引率が高くコスパ抜群のアイテムです。セール期間中・在庫があるうちにぜひチェックしてみてください！`;
  }
}

function copyArticle() {
  navigator.clipboard.writeText(articleCode).then(() => toast('コピーしました！'));
}
function downloadArticle() {
  const ext = document.getElementById('artFmt').value === 'html' ? 'html' : 'md';
  const blob = new Blob([articleCode], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `amazon-sale-${Date.now()}.${ext}`;
  a.click();
  toast('保存しました！');
}
</script>
