<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 Amazon セール品発見ツール</title>
<style>
:root {
  --am: #FF9900; --amd: #e47911;
  --bg: #0f0f13; --s1: #1a1a22; --s2: #22222e;
  --bd: #2e2e3e; --tx: #e8e8f0; --mu: #8888aa;
  --gr: #00d68f; --re: #ff4d6d; --bl: #4d9fff;
  --tw: #1DA1F2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,'Helvetica Neue',sans-serif; background: var(--bg); color: var(--tx); font-size: 14px; line-height: 1.6; min-height: 100vh; }
header { background: var(--s1); border-bottom: 1px solid var(--bd); padding: 12px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
.logo { font-size: 18px; font-weight: 800; background: linear-gradient(90deg,#FF9900,#ffcc44); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
.tab-nav { background: var(--s1); border-bottom: 1px solid var(--bd); padding: 0 20px; display: flex; gap: 4px; }
.tab-nav-btn { padding: 12px 20px; border: none; background: transparent; color: var(--mu); cursor: pointer; font-size: 14px; font-weight: 700; font-family: inherit; border-bottom: 3px solid transparent; transition: all .15s; }
.tab-nav-btn.active { color: var(--am); border-bottom-color: var(--am); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.main { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
input, select, textarea { background: var(--s2); border: 1px solid var(--bd); border-radius: 8px; color: var(--tx); padding: 10px 14px; font-size: 13px; font-family: inherit; transition: border-color .15s; width: 100%; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--am); }
textarea { resize: vertical; }
.label { font-size: 11px; color: var(--mu); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 5px; }
.field { margin-bottom: 14px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; transition: all .15s; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; }
.bp { background: var(--am); color: #000; }
.bp:hover:not(:disabled) { background: var(--amd); transform: translateY(-1px); }
.bs { background: var(--s2); color: var(--tx); border: 1px solid var(--bd); }
.bs:hover { border-color: var(--am); color: var(--am); }
.btn-tw { background: var(--tw); color: #fff; }
.btn-tw:hover:not(:disabled) { background: #0d8fd9; transform: translateY(-1px); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }
.btn-full { width: 100%; justify-content: center; padding: 12px; font-size: 14px; }
.card { background: var(--s1); border: 1px solid var(--bd); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 13px; font-weight: 700; color: var(--am); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.disc-info { background: rgba(255,77,109,.1); border: 1px solid rgba(255,77,109,.3); border-radius: 10px; padding: 12px 16px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.disc-badge { background: var(--re); color: #fff; font-size: 20px; font-weight: 800; padding: 4px 14px; border-radius: 20px; }
.price-now { font-size: 22px; font-weight: 800; color: #fff; }
.price-orig { font-size: 13px; text-decoration: line-through; color: var(--mu); }
.price-save { font-size: 12px; color: var(--gr); font-weight: 700; }
.output-area { background: var(--s2); border: 1px solid var(--bd); border-radius: 10px; padding: 16px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; font-family: inherit; min-height: 80px; margin-top: 10px; }
.output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.output-label { font-size: 11px; font-weight: 700; color: var(--mu); }
.char-count { font-size: 11px; color: var(--mu); }
.char-count.over { color: var(--re); font-weight: 700; }
.search-wrap { background: var(--s1); border-bottom: 1px solid var(--bd); padding: 14px 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.search-wrap .f { display: flex; flex-direction: column; gap: 4px; }
.search-wrap .f label { font-size: 10px; color: var(--mu); font-weight: 700; text-transform: uppercase; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.product-card { background: var(--s1); border: 1px solid var(--bd); border-radius: 14px; overflow: hidden; transition: transform .2s, border-color .2s; display: flex; flex-direction: column; }
.product-card:hover { transform: translateY(-2px); border-color: var(--am); }
.card-img { width: 100%; height: 180px; object-fit: contain; background: #fff; padding: 10px; }
.card-img-ph { width: 100%; height: 180px; background: var(--s2); display: flex; align-items: center; justify-content: center; font-size: 40px; }
.card-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
.card-title2 { font-size: 12px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-badges { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.badge-disc { background: var(--re); color: #fff; font-size: 12px; font-weight: 800; padding: 2px 8px; border-radius: 20px; }
.badge-price { font-size: 18px; font-weight: 800; }
.badge-orig { font-size: 11px; text-decoration: line-through; color: var(--mu); }
.card-actions { display: flex; flex-direction: column; gap: 5px; margin-top: auto; padding-top: 6px; }
.card-actions .btn { width: 100%; justify-content: center; font-size: 11px; padding: 7px; }
.sp { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: currentColor; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 18px; border-radius: 10px; font-weight: 700; font-size: 13px; opacity: 0; transform: translateY(8px); transition: all .25s; z-index: 9999; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--mu); }
.empty-icon { font-size: 56px; margin-bottom: 16px; }
.empty-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--tx); }
.loading-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.skeleton { background: var(--s1); border: 1px solid var(--bd); border-radius: 14px; overflow: hidden; }
.skeleton-img { width: 100%; height: 180px; background: var(--s2); animation: pulse 1.5s infinite; }
.skeleton-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.skeleton-line { height: 12px; background: var(--s2); border-radius: 6px; animation: pulse 1.5s infinite; }
.skeleton-line.short { width: 60%; }
@keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
@media (max-width: 600px) { .row2 { grid-template-columns: 1fr; } .product-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <span>🛒</span>
  <div class="logo">Amazon セール品発見ツール</div>
</header>

<div class="tab-nav">
  <button class="tab-nav-btn active" id="btn-quick" onclick="switchTab('quick',this)">⚡ 即時投稿作成</button>
  <button class="tab-nav-btn" id="btn-search" onclick="switchTab('search',this)">🔍 セール品検索</button>
</div>

<!-- 即時投稿作成タブ -->
<div class="tab-content active" id="tab-quick">
  <div class="main">

    <div class="card">
      <div class="card-title">📦 商品情報を入力（3項目だけでOK）</div>
      <div class="field">
        <span class="label">Amazon URL または ASIN ※必須</span>
        <input id="qUrl" placeholder="https://www.amazon.co.jp/dp/B07XK6Z87X または B07XK6Z87X">
      </div>
      <div class="row2">
        <div class="field">
          <span class="label">定価（円）</span>
          <input type="number" id="qOrig" placeholder="5000" oninput="calcDisc()">
        </div>
        <div class="field">
          <span class="label">セール価格（円）※必須</span>
          <input type="number" id="qSale" placeholder="2980" oninput="calcDisc()">
        </div>
      </div>
      <div id="discInfo" style="display:none" class="disc-info">
        <span class="disc-badge" id="discPct">-0%</span>
        <span class="price-now" id="discSale"></span>
        <span class="price-orig" id="discOrig"></span>
        <span class="price-save" id="discSave"></span>
      </div>
      <div class="field">
        <span class="label">商品名（空欄でAIが自動推測）</span>
        <input id="qName" placeholder="例: Anker PowerCore 10000 モバイルバッテリー">
      </div>
      <div class="field">
        <span class="label">ひとこと補足（任意）</span>
        <input id="qNote" placeholder="例: タイムセール！在庫わずか、旅行に最適">
      </div>
      <button class="btn bp btn-full" id="genBtn" onclick="generateAll()">
        🤖 X投稿文・ブログ記事を一括生成
      </button>
    </div>

    <!-- X投稿文 -->
    <div class="card" id="tweetCard" style="display:none">
      <div class="card-title">🐦 X（Twitter）投稿文</div>
      <div class="output-header">
        <span class="output-label">#PR #AD 含む・140文字以内</span>
        <span class="char-count" id="tweetCount">0文字</span>
      </div>
      <div class="output-area" id="tweetOutput" contenteditable="true" oninput="updateTweetCount()"></div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btn-tw" style="flex:1;justify-content:center;min-width:140px" onclick="copyAndOpenX()">📋 コピーしてXを開く</button>
        <button class="btn bs" onclick="regenTweet(this)">🔄 再生成</button>
      </div>
    </div>

    <!-- はてなブログ記事 -->
    <div class="card" id="blogCard" style="display:none">
      <div class="card-title">📝 はてなブログ用 Markdown記事</div>
      <div class="output-header">
        <span class="output-label">コピーしてはてなブログに貼り付け</span>
        <span class="char-count" id="blogCount">0文字</span>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="btn bs" style="flex:1;justify-content:center;min-width:120px" onclick="copyBlog()">📋 記事をコピー</button>
        <button class="btn bs" onclick="downloadBlog()">💾 保存</button>
        <button class="btn bs" onclick="regenBlog(this)">🔄 再生成</button>
        <button class="btn bp" style="flex:1;justify-content:center;min-width:140px" id="hatenaBtn" onclick="postToHatena()">📝 はてなブログに投稿</button>
      </div>
    </div>

  </div>
</div>

<!-- セール品検索タブ -->
<div class="tab-content" id="tab-search">
  <div class="search-wrap">
    <div class="f" style="flex:1;min-width:200px">
      <label>キーワード検索</label>
      <input id="keywords" placeholder="例: モバイルバッテリー、イヤホン..." style="width:100%" onkeydown="if(event.key==='Enter')searchItems()">
    </div>
    <div class="f">
      <label>カテゴリ</label>
      <select id="category">
        <option value="All">すべて</option>
        <option value="Electronics">家電・カメラ</option>
        <option value="Computers">パソコン・周辺機器</option>
        <option value="HomeAndKitchen">ホーム・キッチン</option>
        <option value="Fashion">ファッション</option>
        <option value="Toys">おもちゃ・ゲーム</option>
        <option value="Sports">スポーツ・アウトドア</option>
        <option value="Beauty">美容・健康</option>
      </select>
    </div>
    <div class="f">
      <label>最低割引率</label>
      <select id="minDiscount">
        <option value="0">指定なし</option>
        <option value="10">10%以上</option>
        <option value="20">20%以上</option>
        <option value="30" selected>30%以上</option>
        <option value="50">50%以上</option>
        <option value="70">70%以上</option>
      </select>
    </div>
    <button class="btn bp" id="searchBtn" onclick="searchItems()">🔍 セール品を探す</button>
  </div>
  <div class="main" style="max-width:1100px">
    <div id="resultsArea">
      <div class="empty-state">
        <div class="empty-icon">🏷️</div>
        <div class="empty-title">セール品を検索してみましょう</div>
        <div style="font-size:13px;color:var(--mu)">PA-API有効化後に使えます</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentProduct = null;
let allItems = [];

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#ff4d6d' : '#00d68f';
  t.style.color = err ? '#fff' : '#000';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function switchTab(name, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
}

function fmtNum(n) { return Number(n).toLocaleString('ja-JP'); }

function extractAsin(input) {
  input = input.trim();
  if (/^[A-Z0-9]{10}$/i.test(input)) return input.toUpperCase();
  const m = input.match(/\/dp\/([A-Z0-9]{10})/i) || input.match(/\/gp\/product\/([A-Z0-9]{10})/i);
  return m ? m[1].toUpperCase() : null;
}

function calcDisc() {
  const o = parseFloat(document.getElementById('qOrig').value) || 0;
  const s = parseFloat(document.getElementById('qSale').value) || 0;
  const el = document.getElementById('discInfo');
  if (!o || !s || s >= o) { el.style.display = 'none'; return; }
  const d = Math.round((1 - s/o) * 100);
  document.getElementById('discPct').textContent = `-${d}%`;
  document.getElementById('discSale').textContent = `¥${fmtNum(s)}`;
  document.getElementById('discOrig').textContent = `¥${fmtNum(o)}`;
  document.getElementById('discSave').textContent = `¥${fmtNum(o - s)}お得！`;
  el.style.display = 'flex';
}

async function generateAll() {
  const urlInput = document.getElementById('qUrl').value.trim();
  const orig = parseFloat(document.getElementById('qOrig').value) || 0;
  const sale = parseFloat(document.getElementById('qSale').value) || 0;
  const name = document.getElementById('qName').value.trim();
  const note = document.getElementById('qNote').value.trim();

  if (!urlInput) { toast('URLまたはASINを入力してください', 1); return; }
  if (!sale) { toast('セール価格を入力してください', 1); return; }
  const asin = extractAsin(urlInput);
  if (!asin) { toast('有効なAmazon URLまたはASINを入力してください', 1); return; }

  const affLink = `https://www.amazon.co.jp/dp/${asin}?tag=popo1215-22`;
  const disc = orig && sale ? Math.round((1 - sale/orig) * 100) : 0;
  const save = orig && sale ? orig - sale : 0;

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>AIが生成中...';

  currentProduct = { asin, name, orig, sale, disc, save, affLink, note };

  try {
    const [tw, bl] = await Promise.all([
      genTweetText(currentProduct),
      genBlogText(currentProduct)
    ]);

    document.getElementById('tweetOutput').textContent = tw;
    document.getElementById('blogOutput').textContent = bl;
    document.getElementById('tweetCard').style.display = 'block';
    document.getElementById('blogCard').style.display = 'block';
    updateTweetCount();
    document.getElementById('blogCount').textContent = bl.length + '文字';
    toast('生成完了！🎉');
    document.getElementById('tweetCard').scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    toast('生成失敗: ' + e.message, 1);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🤖 X投稿文・ブログ記事を一括生成';
  }
}

async function genTweetText(p) {
  const prompt = `あなたはAmazonアフィリエイトの投稿プロです。
以下の商品情報でX（Twitter）投稿文を日本語で作成してください。

ASIN: ${p.asin}
商品名: ${p.name || '（ASINから推測）'}
セール価格: ¥${fmtNum(p.sale)}
定価: ${p.orig ? '¥'+fmtNum(p.orig) : '不明'}
割引率: ${p.disc}%OFF
節約額: ${p.save > 0 ? '¥'+fmtNum(p.save) : '不明'}
リンク: ${p.affLink}
補足: ${p.note || 'なし'}

【厳守ルール】
- 必ず以下の形式で出力すること（改行位置を厳守）：

【${p.disc}%OFF🔥】商品名を短く（20文字以内）
¥${fmtNum(p.orig)}→¥${fmtNum(p.sale)}（¥${fmtNum(p.save)}お得！）
⏰在庫わずか！特徴を一言で。

${p.affLink}
#PR #AD #AM #セール #激安

- 上記フォーマットの改行を必ず守ること
- 本文は合計140文字以内に収めること
- マークダウン不使用、そのまま投稿できる形式`;
  return await callClaude(prompt);
}

async function genBlogText(p) {
  const date = new Date().toLocaleDateString('ja-JP');
  const prompt = `あなたはAmazonアフィリエイトのプロブロガーです。
以下の商品情報ではてなブログ用Markdown記事を作成してください。

ASIN: ${p.asin}
商品名: ${p.name || '（ASINから推測）'}
セール価格: ¥${fmtNum(p.sale)}
定価: ${p.orig ? '¥'+fmtNum(p.orig) : '不明'}
割引率: ${p.disc}%OFF
節約額: ${p.save > 0 ? '¥'+fmtNum(p.save) : '不明'}
リンク: ${p.affLink}
補足: ${p.note || 'なし'}
作成日: ${date}

【必須構成】
1. SEOタイトル（# h1）
2. 冒頭に必ず以下を入れる（変更禁止）：
   > ※本記事にはアフィリエイトリンクが含まれます。 #AD
3. リード文（100文字・読者の共感を呼ぶ）
4. 商品概要（価格・割引率・特徴）
5. こんな人におすすめ（箇条書き）
6. スペック・特徴（商品名から推測して記載）
7. メリット・デメリット
8. 購入リンク：
   [🛒 Amazonで購入する（¥${fmtNum(p.sale)}）](${p.affLink})
9. まとめ

【ルール】
- Markdownのみ・HTMLタグ不使用
- 1500〜2000文字
- 購買意欲を高める文体`;
  return await callClaude(prompt);
}

async function callClaude(prompt) {
  const res = await fetch('https://amazon-sale-api.bulibuli-mushi.workers.dev', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'claude', prompt })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.text || '';
}

function updateTweetCount() {
  const text = document.getElementById('tweetOutput').textContent;
  const el = document.getElementById('tweetCount');
  el.textContent = text.length + '文字';
  el.className = 'char-count' + (text.length > 140 ? ' over' : '');
}

function copyAndOpenX() {
  const text = document.getElementById('tweetOutput').textContent;
  navigator.clipboard.writeText(text).then(() => {
    toast('コピーしました！Xに貼り付けて投稿してください 🐦');
    window.open('https://twitter.com/intent/tweet', '_blank');
  });
}

function copyBlog() {
  const text = document.getElementById('blogOutput').textContent;
  navigator.clipboard.writeText(text).then(() => toast('記事をコピーしました！'));
}

function downloadBlog() {
  const text = document.getElementById('blogOutput').textContent;
  if (!text) { toast('まず生成してください', 1); return; }
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'blog-' + Date.now() + '.md';
  a.click();
  toast('保存しました！');
}

async function regenTweet(btn) {
  if (!currentProduct) { toast('先に商品情報を入力してください', 1); return; }
  btn.disabled = true; btn.textContent = '生成中...';
  try {
    const tw = await genTweetText(currentProduct);
    document.getElementById('tweetOutput').textContent = tw;
    updateTweetCount();
    toast('再生成しました！');
  } catch(e) { toast('失敗: ' + e.message, 1); }
  finally { btn.disabled = false; btn.textContent = '🔄 再生成'; }
}

async function regenBlog(btn) {
  if (!currentProduct) { toast('先に商品情報を入力してください', 1); return; }
  btn.disabled = true; btn.textContent = '生成中...';
  try {
    const bl = await genBlogText(currentProduct);
    document.getElementById('blogOutput').textContent = bl;
    document.getElementById('blogCount').textContent = bl.length + '文字';
    toast('再生成しました！');
  } catch(e) { toast('失敗: ' + e.message, 1); }
  finally { btn.disabled = false; btn.textContent = '🔄 再生成'; }
}

async function searchItems() {
  const keywords = document.getElementById('keywords').value.trim();
  if (!keywords) { toast('キーワードを入力してください', 1); return; }
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>検索中...';
  document.getElementById('resultsArea').innerHTML = `<div class="loading-grid">${Array(6).fill('<div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>').join('')}</div>`;
  try {
    const res = await fetch('https://amazon-sale-api.bulibuli-mushi.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keywords, category: document.getElementById('category').value, minDiscount: parseInt(document.getElementById('minDiscount').value), sortBy: 'Relevance' })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'APIエラー');
    allItems = data.items || [];
    renderResults();
    if (!allItems.length) document.getElementById('resultsArea').innerHTML = `<div class="empty-state"><div class="empty-icon">😢</div><div class="empty-title">該当商品が見つかりませんでした</div></div>`;
  } catch(e) {
    document.getElementById('resultsArea').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">エラー</div><div style="color:var(--re);font-size:13px">${e.message}</div></div>`;
  } finally {
    btn.disabled = false; btn.innerHTML = '🔍 セール品を探す';
  }
}

function renderResults() {
  const area = document.getElementById('resultsArea');
  const saving = i => i.originalPrice && i.price ? i.originalPrice - i.price : 0;
  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:15px;font-weight:700">検索結果</div>
      <div style="font-size:12px;color:var(--mu)">${allItems.length}件</div>
    </div>
    <div class="product-grid">
      ${allItems.map(item => `
        <div class="product-card">
          ${item.image ? `<img class="card-img" src="${item.image}" alt="${item.title}" loading="lazy">` : `<div class="card-img-ph">📦</div>`}
          <div class="card-body">
            <div class="card-title2">${item.title}</div>
            <div class="card-badges">
              ${item.discount > 0 ? `<span class="badge-disc">-${item.discount}%</span>` : ''}
              ${item.price ? `<span class="badge-price">¥${fmtNum(item.price)}</span>` : ''}
              ${item.originalPrice ? `<span class="badge-orig">¥${fmtNum(item.originalPrice)}</span>` : ''}
            </div>
            ${saving(item) > 0 ? `<div style="font-size:11px;color:var(--gr);font-weight:700">¥${fmtNum(saving(item))}お得！</div>` : ''}
            <div class="card-actions">
              <button class="btn btn-tw" onclick="quickPost('${item.asin}','${encodeURIComponent(item.title)}',${item.price||0},${item.originalPrice||0})">⚡ 投稿文・記事を生成</button>
              <a href="${item.url}" target="_blank" style="display:flex;align-items:center;justify-content:center;padding:7px;border-radius:8px;border:1px solid var(--bd);color:var(--am);text-decoration:none;font-size:11px;font-weight:700">🛒 Amazonで見る</a>
            </div>
          </div>
        </div>`).join('')}
    </div>`;
}

function quickPost(asin, encodedName, price, orig) {
  document.getElementById('qUrl').value = asin;
  document.getElementById('qName').value = decodeURIComponent(encodedName);
  document.getElementById('qSale').value = price;
  document.getElementById('qOrig').value = orig;
  calcDisc();
  switchTab('quick', document.getElementById('btn-quick'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
  generateAll();
}
async function postToHatena() {
  if (!currentProduct) { toast('先に商品情報を入力してください', 1); return; }
  const title = document.getElementById('blogOutput').textContent.split('\n')[0].replace(/^#\s*/, '').trim();
  const body = document.getElementById('blogOutput').textContent;
  if (!body) { toast('先にブログ記事を生成してください', 1); return; }

  const hatenaId = prompt('はてなID（例: hajime085）を入力してください');
  if (!hatenaId) return;
  const blogId = prompt('ブログID（例: hajime085.hatenablog.com）を入力してください');
  if (!blogId) return;

  const btn = document.getElementById('hatenaBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>投稿中...';

  try {
    const res = await fetch('https://amazon-sale-api.bulibuli-mushi.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'hatena-post', title, body, hatenaId, blogId })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    toast('はてなブログに投稿しました！🎉');
  } catch(e) {
    toast('投稿失敗: ' + e.message, 1);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '📝 はてなブログに投稿';
  }
}  
</script>
</body>
</html>
