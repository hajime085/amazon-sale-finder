
<!-- URL INPUT TAB -->
<div class="search-wrap" id="urlTab" style="display:none">
  <div class="f" style="flex:1;min-width:200px">
    <label>Amazon商品URL</label>
    <input id="productUrl" placeholder="例: https://www.amazon.co.jp/dp/B0XXXXXXXX" style="width:100%"
      onkeydown="if(event.key==='Enter')scrapeProduct()">
  </div>
  <button class="btn bp" id="scrapeBtn" onclick="scrapeProduct()" style="padding:9px 24px">
    🔍 URLを解析
  </button>
</div>
